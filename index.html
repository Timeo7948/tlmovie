<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirection...</title>

  <!-- Redirection si JS désactivé -->
  <meta http-equiv="refresh" content="3;url=https://fruity-taxis-travel.loca.lt">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      text-align: center;
    }

    .loader {
      border: 6px solid #1e293b;
      border-top: 6px solid #3b82f6;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
      box-shadow: 0 0 20px #3b82f6;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="loader"></div>
  <h1>Chargement en cours...</h1>
  <p>Redirection dans <span id="count">1</span> secondes</p>

  <button onclick="goNow()">Aller maintenant !</button>

  <script>
    let time = 1;
    const counter = document.getElementById("count");

    const interval = setInterval(() => {
      time--;
      counter.textContent = time;

      if (time <= 0) {
        clearInterval(interval);
        window.location.href = "https://fruity-taxis-travel.loca.lt";
      }
    }, 1000);

    function goNow() {
      window.location.href = "https://fruity-taxis-travel.loca.lt";
    }
  </script>

</body>
</html>
